<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>☕ Виртуальное кафе</title>
<script src="vendor/aframe.min.js"></script>
<script src="vendor/socket.io.min.js"></script>
<script src="vendor/peerjs.min.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ЭКРАН ВХОДА -->
  <div id="landing">
    <div class="panel">
      <h1>☕ Виртуальное кафе</h1>
      <p class="subtitle">Встречи, разговоры и голос — прямо в браузере</p>

      <label>Ваше имя</label>
      <input id="nameInput" type="text" maxlength="24" placeholder="Как вас представить?" />

      <label>Цвет аватара</label>
      <div id="colorPicker" class="color-picker"></div>

      <div class="tabs">
        <button id="tabCreate" class="tab active">Создать комнату</button>
        <button id="tabJoin" class="tab">Войти по коду</button>
      </div>

      <div id="paneCreate" class="pane">
        <button id="createBtn" class="primary">Создать кафе</button>
      </div>

      <div id="paneJoin" class="pane hidden">
        <input id="joinCodeInput" type="text" maxlength="8" placeholder="Код комнаты" style="text-transform:uppercase" />
        <button id="joinBtn" class="primary">Войти</button>
      </div>

      <p id="landingError" class="error hidden"></p>
    </div>
  </div>

  <!-- ПАНЕЛЬ ПРИГЛАШЕНИЯ (после создания/входа в комнату) -->
  <div id="roomPanel" class="hud hidden">
    <div class="room-code-box">
      <span>Код комнаты</span>
      <strong id="roomCodeLabel">——</strong>
      <button id="copyLinkBtn" title="Скопировать ссылку">🔗</button>
    </div>
    <button id="inviteBtn" class="tg-btn">✈️ Пригласить в Telegram</button>
  </div>

  <!-- Мини-форма приглашения -->
  <div id="invitePanel" class="modal hidden">
    <div class="modal-box">
      <h3>Отправить приглашение в Telegram</h3>
      <label>Chat ID получателя (необязательно — иначе уйдёт на chat по умолчанию)</label>
      <input id="inviteChatId" type="text" placeholder="например -1001234567890" />
      <div class="modal-actions">
        <button id="inviteSendBtn" class="primary">Отправить</button>
        <button id="inviteCancelBtn" class="secondary">Отмена</button>
      </div>
      <p id="inviteStatus" class="status"></p>
    </div>
  </div>

  <!-- Список участников -->
  <div id="userList" class="hud userlist hidden"></div>

  <!-- Чат -->
  <div id="chatBox" class="hud chatbox hidden">
    <div id="chatMessages"></div>
    <input id="chatInput" type="text" placeholder="Написать сообщение… (Enter)" maxlength="500" />
  </div>

  <!-- Управление голосом -->
  <div id="voiceControls" class="hud voice-controls hidden">
    <button id="muteBtn">🎙️</button>
    <span id="micStatus">Микрофон включён</span>
    <button id="musicBtn" title="Включить/выключить музыку">🎵</button>
    <button id="menuBtn" title="Меню бара">📋 Меню</button>
  </div>

  <!-- Меню заказа -->
  <div id="orderPanel" class="modal hidden">
    <div class="modal-box">
      <h3>☕ Меню бара</h3>
      <p class="menu-hint">Выберите — заказ увидят все в комнате, бармен «примет» его в чате.</p>
      <div id="menuItems" class="menu-items"></div>
      <div class="modal-actions">
        <button id="orderCancelBtn" class="secondary">Закрыть</button>
      </div>
      <p id="orderStatus" class="status"></p>
    </div>
  </div>

  <div id="controlsHint" class="hud hint hidden">WASD — идти · мышь — оглядеться · Enter — чат</div>

  <!-- 3D СЦЕНА -->
  <a-scene id="scene" class="hidden" renderer="colorManagement: true" vr-mode-ui="enabled: false">
    <a-sky color="#2b2118"></a-sky>

    <!-- Освещение -->
    <a-entity light="type: ambient; color: #cbb8a5; intensity: 1.4"></a-entity>
    <a-entity light="type: hemisphere; color: #fff3e0; groundColor: #4a3527; intensity: 0.9"></a-entity>
    <a-entity light="type: point; color: #ffcf9c; intensity: 1.8; distance: 18" position="0 4 0"></a-entity>
    <a-entity light="type: point; color: #ffd9a0; intensity: 1.4; distance: 16" position="-8 3.5 -6"></a-entity>
    <a-entity light="type: point; color: #9fe3ff; intensity: 1.2; distance: 14" position="8 3.5 -6"></a-entity>
    <a-entity light="type: point; color: #ffe3b8; intensity: 1.2; distance: 14" position="-8 3.5 6"></a-entity>
    <a-entity light="type: point; color: #ffe3b8; intensity: 1.2; distance: 14" position="8 3.5 6"></a-entity>

    <!-- Пол и стены кафе -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="26" height="20" color="#6b4f3d" material="roughness:0.9"></a-plane>
    <a-box position="0 2.5 -10" width="26" height="5" depth="0.2" color="#5a4132"></a-box>
    <a-box position="-13 2.5 0" rotation="0 90 0" width="20" height="5" depth="0.2" color="#5a4132"></a-box>
    <a-box position="13 2.5 0" rotation="0 90 0" width="20" height="5" depth="0.2" color="#5a4132"></a-box>
    <a-box position="0 2.5 10" width="26" height="5" depth="0.2" color="#513a2c"></a-box>

    <!-- Барная стойка -->
    <a-box position="0 0.6 -8.5" width="8" height="1.2" depth="1" color="#5c3d2e"></a-box>
    <a-box position="0 1.3 -8.5" width="8" height="0.1" depth="1.1" color="#caa06a"></a-box>
    <a-entity id="npcBarman" position="0 0 -9.3">
      <a-cylinder radius="0.28" height="1.3" position="0 0.9 0" color="#c0392b"></a-cylinder>
      <a-sphere radius="0.22" position="0 1.75 0" color="#e0a893"></a-sphere>
      <a-text value="Бармен" align="center" position="0 2.15 0" color="#fff" scale="0.6 0.6 0.6"></a-text>
    </a-entity>

    <!-- Столики (3 обычных зала) -->
    <a-entity id="tables"></a-entity>

    <!-- VIP-комнаты -->
    <a-entity id="vipRooms"></a-entity>

    <!-- Сцена караоке -->
    <a-box position="-10 0.3 8" width="5" height="0.6" depth="3" color="#4b2e2e"></a-box>
    <a-entity id="npcSinger" position="-10 0 8">
      <a-cylinder radius="0.28" height="1.3" position="0 0.9 0" color="#f1c40f"></a-cylinder>
      <a-sphere radius="0.22" position="0 1.75 0" color="#e0a893"></a-sphere>
      <a-text value="Певец" align="center" position="0 2.15 0" color="#fff" scale="0.6 0.6 0.6"></a-text>
    </a-entity>
    <a-text value="🎤 КАРАОКЕ" position="-10 2.4 8" align="center" color="#f1c40f" scale="1.5 1.5 1.5"></a-text>

    <!-- Официанты (добавляются и анимируются через JS) -->
    <a-entity id="npcWaiters"></a-entity>

    <!-- Игрок (камера) -->
    <a-entity id="rig" position="0 1.6 6" wasd-controls="acceleration:60; fly:false">
      <a-camera id="camera" look-controls="pointerLockEnabled:true">
        <a-cursor></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Остальные гости добавляются сюда динамически -->
    <a-entity id="otherPlayers"></a-entity>
  </a-scene>

  <script src="app.js"></script>
</body>
</html>
